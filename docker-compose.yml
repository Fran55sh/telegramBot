services:
  telegram_finance_bot:
    build:
      context: .
      args:
        VITE_WEB_APP_TOKEN: ${WEB_APP_TOKEN:-dev-token-change-me}
        VITE_TELEGRAM_CHAT_ID: ${VITE_TELEGRAM_CHAT_ID:-}
    image: telegram-finance-bot:local
    container_name: telegram_finance_bot
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: sqlite:////app/data/assistant.db
    env_file:
      - .env
    volumes:
      - telegram_finance_data:/app/data
    restart: unless-stopped

volumes:
  telegram_finance_data:
