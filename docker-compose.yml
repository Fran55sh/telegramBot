services:
  telegram_finance_bot:
    build: .
    image: telegram-finance-bot:local
    container_name: telegram_finance_bot
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/assistant.db
    env_file:
      - .env
    volumes:
      - telegram_finance_data:/app/data
    restart: unless-stopped

volumes:
  telegram_finance_data:
